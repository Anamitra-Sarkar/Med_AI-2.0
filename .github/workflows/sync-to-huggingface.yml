name: Sync Backend to HuggingFace Space

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  sync-to-huggingface:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout full repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Prepare backend for HF
      - name: Prepare backend
        run: |
          mkdir -p /tmp/hf-sync
          rsync -av --exclude='.git' backend/ /tmp/hf-sync/
          cd /tmp/hf-sync

          # Configure Git identity FIRST (globally) before any git operation
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global init.defaultBranch main

          # Initialize repo
          git init

          # Setup Git LFS and track files
          git lfs install
          git lfs track "*.h5"
          git lfs track "*.pth"
          git lfs track "*.pt"
          git lfs track "*.keras"
          git lfs track "*.weights.h5"

          git add .

          # Only commit if there are staged changes (prevents failure when nothing changed)
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-sync backend from GitHub"
          else
            echo "No changes to commit"
          fi

      # 3️⃣ Push to HuggingFace Space
      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE_NAME }}
        run: |
          cd /tmp/hf-sync
          git remote add origin https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}
          git push --force origin main
